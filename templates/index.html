<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech News</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: white;
    }

    .header {
        text-align: center;
        padding: 20px;
        font-size: 2rem;
        color: #38bdf8;
        font-weight: bold;
    }

    .container {
        max-width: 800px;
        margin: auto;
        padding: 20px;
    }

    .card {
        background: #1e293b;
        padding: 20px;
        margin-bottom: 15px;
        border-radius: 10px;
        transition: 0.3s;
        border-left: 5px solid #38bdf8;
    }

    .card:hover {
        transform: translateY(-5px);
    }

    .btn {
        display: block;
        margin: 20px auto;
        padding: 12px 25px;
        background: #38bdf8;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
    }

    .loading {
        text-align: center;
        margin-top: 20px;
        color: #94a3b8;
    }

</style>
</head>

<body>

<div class="header">🚀 Latest Tech News</div>

<button class="btn" onclick="loadNews()">Get News</button>

<div id="news-container" class="container"></div>

<div id="loading" class="loading"></div>

<script>
async function loadNews() {
    const container = document.getElementById('news-container');
    const loading = document.getElementById('loading');

    container.innerHTML = "";
    loading.innerText = "Loading news... ⏳";

    try {
        const res = await fetch('/get-news');
        const data = await res.json();

        loading.innerText = "";

        if (!data || data.length === 0) {
            loading.innerText = "No news available.";
            return;
        }

        data.forEach(item => {
            const card = document.createElement('div');
            card.className = "card";

            // Handles both "news" and "text"
            const content = item.news || item.text || "No content";

            card.innerText = content;

            container.appendChild(card);
        });

    } catch (error) {
        loading.innerText = "Error loading news 😢";
        console.error(error);
    }
}
</script>

</body>
</html>
